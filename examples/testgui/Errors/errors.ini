
[EMC]
MACHINE = Error Tester
VERSION = 1.1

[DISPLAY]
DISPLAY = flexgui
GUI = errors.ui
#EDITOR = gedit
#PROGRAM_PREFIX = ~/ferd
MAX_FEED_OVERRIDE = 1.2

[FLEXGUI]
MANUAL_TOOL_CHANGE = True
PLOT_UNITS = true
PLOT_GRID = 1/2, 1 in, 1 1/2, 2 inch
#IMPORT_PYTHON = post
QSS = style.qss
#THEME = dark
#RESOURCES = resources.py
DRO_FONT_SIZE = 16
JOG_INCREMENTS = 0.250, 0.100, 0.010, 0.001
KEYBOARD_JOG = True
KB_JOG_INCREMENT = True

[SPINDLE_0]
MAX_OVERRIDE = 120
MIN_RPM = 500
MAX_RPM = 5000
DEFAULT_RPM = 5000

[KINS]
JOINTS = 3
KINEMATICS = trivkins coordinates=XYZ

[RS274NGC]
PARAMETER_FILE = parameters.var

[HAL]
HALFILE = main.hal
HALUI = halui
POSTGUI_HALFILE = postgui.hal

[TASK]
TASK = milltask
CYCLE_TIME = 0.010

[TRAJ]
COORDINATES =  X Y Z
MAX_LINEAR_VELOCITY = 1.00
LINEAR_UNITS = inch
ANGULAR_UNITS = degree

[EMCIO]
EMCIO = io
CYCLE_TIME = 0.100
TOOL_TABLE = tool.tbl

