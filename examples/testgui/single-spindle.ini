
[EMC]
MACHINE = Test GUI
DEBUG = 0
VERSION = 1.1

[DISPLAY]
DISPLAY = flexgui
GUI = single-spindle.ui
#GUI = test-io.ui
INTRO_GRAPHIC = ''
INTRO_TIME = 0
EDITOR = pluma
MAX_FEED_OVERRIDE = 1.2
DEFAULT_LINEAR_VELOCITY = 0.2
MAX_LINEAR_VELOCITY = 1.00
PROGRAM_PREFIX = ~/linuxcnc/nc_files
INCREMENTS = 1/2 in, 9/16, 0.100 inch, 0.010 in, 0.001
# file in configuration directory
OPEN_FILE = square.ngc

TOOL_EDITOR = tooledit x y z diam

# full path example
#OPEN_FILE = /home/john/linuxcnc/nc_files/unit-test-mm.ngc

# relative path from the users home directory
#OPEN_FILE = ~/linuxcnc/nc_files/3D_Chips.ngc

# path points to the configuration directory
#OPEN_FILE = ./simple.ngc

[FLEXGUI]
CYCLE_TIME = 100
#THEME = keyboard
QSS = test.qss
#ESTOP_OPEN_COLOR = blue
DRO_FONT_SIZE = 10
PLOT_BACKGROUND_COLOR = 0.0,0.0,0.5
#PLOT_UNITS = True
#DRO_UNITS = True
#KEYBOARD_JOG = True
#PLOT_GRID = 1/2, 1 in, 1 1/2, 2 inch
